<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>センプの😀雑談ライブ</title>
  <style>
    body { background:#0f0f0f; color:#fff; font-family:sans-serif; margin:0; }
    header { display:flex; justify-content:space-between; align-items:center; padding:12px 24px; border-bottom:1px solid #272727; }
    .logo { font-size:20px; font-weight:bold; color:#3ea6ff; text-decoration:none; }
    .search-box { background:#121212; border:1px solid #303030; padding:8px 16px; border-radius:40px; width:300px; color:white; }
    .container { display:flex; max-width:1200px; margin:20px auto; gap:24px; padding:0 20px; }
    .main-content { flex:2; }
    .chat-sidebar { flex:1; background:#181818; border:1px solid #2d2d2d; border-radius:12px; display:flex; flex-direction:column; height:500px; }
    .video-wrapper { width:100%; background:radial-gradient(circle,#222,#050505); border-radius:12px; overflow:hidden; aspect-ratio:16/9; position:relative; }
    .avatar-emoji { position:absolute; font-size:80px; top:35%; left:42%; user-select:none; transition:all 0.3s; z-index:2; }
    .avatar-emoji.floating { animation:talk 3s ease-in-out infinite alternate; }
    .avatar-emoji.excited { animation:rush 1s linear infinite; }
    .avatar-emoji.away { top:35%; left:-150px; transform:rotate(-15deg); }
    .speech-bubble { position:absolute; top:10%; left:50%; transform:translateX(-50%) scale(0.8); background:white; color:black; font-weight:bold; padding:10px 16px; border-radius:20px; font-size:14px; width:max-content; max-width:80%; white-space:normal; word-break:break-all; box-shadow:0 4px 10px rgba(0,0,0,0.3); opacity:0; transition:all 0.2s; z-index:3; }
    .speech-bubble::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); border-width:10px 10px 0; border-style:solid; border-color:white transparent; }
    .speech-bubble.show { opacity:1; transform:translateX(-50%) scale(1); }
    @keyframes talk { 0% { transform:translateY(0); } 50% { transform:translateY(-15px) rotate(5deg); } 100% { transform:translateY(0); } }
    @keyframes rush { 0% { transform:translate(0,0); } 50% { transform:translate(10px,-15px); } 100% { transform:translate(0,0); } }
    .video-title { font-size:20px; margin:12px 0; font-weight:bold; display:flex; align-items:center; gap:8px; }
    .live-tag { background:#ff0000; color:white; font-size:12px; padding:2px 6px; border-radius:4px; }
    .chat-header { padding:12px; border-bottom:1px solid #2d2d2d; font-weight:bold; }
    .chat-messages { flex:1; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; font-size:13px; }
    .chat-item { animation:fadeIn 0.2s; }
    .chat-user { color:#aaa; font-weight:bold; margin-right:6px; }
    .chat-user.self { color:#3ea6ff; }
    .chat-input-wrap { padding:12px; border-top:1px solid #2d2d2d; display:flex; gap:8px; }
    .chat-input { flex:1; background:#272727; border:none; border-radius:18px; color:white; padding:8px 12px; }
    .btn-send { background:#3ea6ff; color:black; border:none; padding:8px 14px; border-radius:18px; font-weight:bold; cursor:pointer; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">🏠 センプウェブビデオ</a>
    <input type="text" id="searchBox" class="search-box" placeholder="検索" onkeypress="toHome(event)">
  </header>
  <div class="container">
    <div class="main-content">
      <div class="video-wrapper">
        <div class="speech-bubble" id="speechBubble"></div>
        <div class="avatar-emoji floating" id="liveEmoji">😀</div>
      </div>
      <div class="video-title"><span class="live-tag">LIVE</span> センプの😀雑談ライブ</div>
      <div style="font-size:12px; color:#ff4e4e;">● <span id="liveCountText">5,820</span> 人が視聴中</div>
    </div>
    <div class="chat-sidebar">
      <div class="chat-header">ライブチャット</div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-wrap">
        <input type="text" id="chatInput" class="chat-input" placeholder="チャットを入力...">
        <button class="btn-send" onclick="sendChat()">送信</button>
      </div>
    </div>
  </div>
  <script>
    function toHome(e) { if (e.key === 'Enter') window.location.href = `index.html?search=${encodeURIComponent(document.getElementById('searchBox').value.trim())}`; }
    const botMessages = [
      { user: "たなか", text: "😀めっちゃ動くやんｗｗ" }, { user: "NPC-99", text: "わこつ！" }, { user: "ゲーム好き", text: "ジワる" },
      { user: "sempマニア", text: "キレが良いですね" }, { user: "sakura", text: "楽しそう草" }, { user: "匿名くん", text: "チャット拾って！" }
    ];
    const emojiFaces = ["😀", "😆", "😮", "🤣", "😉"];
    let viewers = 5820, isAway = false, mouthInterval;
    function startMouth() {
      clearInterval(mouthInterval);
      mouthInterval = setInterval(() => { if (!isAway) document.getElementById('liveEmoji').innerText = emojiFaces[Math.floor(Math.random() * emojiFaces.length)]; }, 1000);
    }
    function appendMsg(user, text, isSelf = false) {
      const item = document.createElement('div');
      item.innerHTML = `<span class="${isSelf ? 'chat-user self' : 'chat-user'}">${user}:</span><span>${text}</span>`;
      const box = document.getElementById('chatMessages');
      box.appendChild(item); box.scrollTop = box.scrollHeight;
      if (isAway) return;
      const emojiEl = document.getElementById('liveEmoji'), bubbleEl = document.getElementById('speechBubble');
      if (isSelf) {
        clearInterval(mouthInterval); emojiEl.innerText = "😮";
        bubbleEl.innerText = `「${text}」ありがとう！`; bubbleEl.classList.add('show');
        setTimeout(() => { bubbleEl.classList.remove('show'); if (!isAway) startMouth(); }, 3000);
      } else {
        const rand = Math.random();
        if (rand < 0.1) {
          isAway = true; clearInterval(mouthInterval); emojiEl.innerText = "😡"; emojiEl.className = "avatar-emoji away"; bubbleEl.classList.remove('show');
          setTimeout(() => { emojiEl.className = "avatar-emoji floating"; isAway = false; startMouth(); }, 4000);
        } else if (rand < 0.3) {
          clearInterval(mouthInterval); emojiEl.innerText = "🤪"; emojiEl.className = "avatar-emoji excited";
          setTimeout(() => { if (!isAway) { emojiEl.className = "avatar-emoji floating"; startMouth(); } }, 1500);
        }
      }
    }
    function sendChat() { const input = document.getElementById('chatInput'); const text = input.value.trim(); if (!text) return; appendMsg("ゲスト", text, true); input.value = ""; }
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
    setInterval(() => { appendMsg(botMessages[Math.floor(Math.random() * botMessages.length)].user, botMessages[Math.floor(Math.random() * botMessages.length)].text, false); }, 2500);
    setInterval(() => { viewers += Math.floor(Math.random() * 36) - 15; document.getElementById('liveCountText').innerText = viewers.toLocaleString(); }, 3000);
    startMouth();
  </script>
</body>
</html>
