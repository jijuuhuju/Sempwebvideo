<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>センプウェブとは？ - センプウェブビデオ</title>
  <style>
    body { background-color: #0f0f0f; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { padding: 12px 24px; border-bottom: 1px solid #272727; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: bold; color: #3ea6ff; text-decoration: none; }
    
    /* 検索ボックス */
    .search-box {
      background: #121212;
      border: 1px solid #303030;
      padding: 8px 16px;
      border-radius: 40px;
      width: 300px;
      color: white;
    }
    .search-box:focus { outline: 1px solid #3ea6ff; }

    /* 左右レイアウト */
    .container { display: flex; max-width: 1200px; margin: 20px auto; gap: 24px; padding: 0 20px; }
    .main-content { flex: 2; }
    .sidebar { flex: 1; display: flex; flex-direction: column; gap: 16px; }

    /* ビデオプレイヤー */
    .video-wrapper { width: 100%; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .video-title { font-size: 20px; margin: 12px 0; font-weight: bold; }
    
    /* チャンネル・評価バー */
    .channel-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #272727; }
    .btn-sub { background: #3ea6ff; color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .btn-sub.subscribed { background: #272727; color: #aaa; }
    .like-dislike-container { display: flex; background: #272727; border-radius: 20px; overflow: hidden; }
    .btn-like, .btn-dislike { background: transparent; color: white; border: none; padding: 8px 16px; cursor: pointer; }
    .btn-like { border-right: 1px solid #444; }
    .btn-like.active { color: #3ea6ff; }
    .btn-dislike.active { color: #ff4e4e; }
    
    /* コメント */
    .comment-section { margin-top: 24px; }
    .comment-input-wrap { display: flex; gap: 12px; margin-bottom: 20px; }
    .comment-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid #717171; color: white; padding: 4px 0; }
    .comment-input:focus { outline: none; border-bottom: 2px solid white; }
    .comment-list { display: flex; flex-direction: column; gap: 16px; font-size: 14px; }

    /* 右側の関連動画アイテム */
    .video-item { display: flex; gap: 12px; text-decoration: none; color: white; cursor: pointer; }
    .video-item:hover { background: #272727; border-radius: 8px; padding: 2px; margin: -2px; }
    .side-thumbnail { width: 140px; aspect-ratio: 16/9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .side-title { font-weight: bold; font-size: 14px; line-height: 1.3; }
    .side-author { color: #aaa; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">🏠 センプウェブビデオ</a>
    <!-- 検索ボックス（文字を入れてEnterを押すとキーワードを持ってホームに飛びます） -->
    <input type="text" id="searchBox" class="search-box" placeholder="動画タイトルを検索" onkeypress="goToHomeSearch(event)">
  </header>

  <div class="container">
    <!-- 左側：メイン動画 & コメント -->
    <div class="main-content">
      <div class="video-wrapper">
        <video src="v1.mp4" controls autoplay></video>
      </div>
      <div class="video-title">センプウェブとは？</div>
      
      <div class="channel-bar">
        <div>
          <div style="font-weight:bold;">センプ公式チャンネル</div>
          <div style="font-size:12px; color:#aaa;" id="subCount">チャンネル登録者数 10万人</div>
        </div>
        <button id="subBtn" class="btn-sub" onclick="toggleSubscribe()">チャンネル登録</button>
        
        <div class="like-dislike-container">
          <button id="likeBtn" class="btn-like" onclick="toggleLike()">👍 <span id="likeCount">126</span></button>
          <button id="dislikeBtn" class="btn-dislike" onclick="toggleDislike()">👎</button>
        </div>
      </div>

      <!-- コメント -->
      <div class="comment-section">
        <h3 id="commentCount">コメント 0 件</h3>
        <div class="comment-input-wrap">
          <input type="text" id="commentInput" class="comment-input" placeholder="コメントを追加...">
          <button onclick="addComment()" style="background:#272727; color:white; border:none; padding:8px 12px; border-radius:18px; cursor:pointer;">投稿</button>
        </div>
        <div id="commentList" class="comment-list"></div>
      </div>
    </div>

    <!-- 右側：関連動画リスト（動画2と動画3を表示） -->
    <div class="sidebar">
      <!-- 動画2へのリンク -->
      <a href="v2.html" class="video-item">
        <div class="side-thumbnail" style="background: linear-gradient(135deg, #fe8c00, #f83600);">🎮</div>
        <div>
          <div class="side-title">迷路ゲーム実況をやろう！</div>
          <div class="side-author">センプ公式チャンネル</div>
        </div>
      </a>

      <!-- 動画3へのリンク -->
      <a href="v3.html" class="video-item">
        <div class="side-thumbnail" style="background: linear-gradient(135deg, #ed4264, #ffedbc);">🍗</div>
        <div>
          <div class="side-title">チキンバトルロイヤルやってみた</div>
          <div class="side-author">センプ公式チャンネル</div>
        </div>
      </a>
    </div>
  </div>

  <script>
    // 動画1用のデータ設定
    const videoId = "v1"; 
    const defaultLikes = 126;

    // 検索窓からホームへキーワードを送信
    function goToHomeSearch(event) {
      if (event.key === 'Enter') {
        const query = document.getElementById('searchBox').value.trim();
        window.location.href = `index.html?search=${encodeURIComponent(query)}`;
      }
    }

    // いいね・低評価の処理
    function loadLikeDislike() {
      const stats = JSON.parse(localStorage.getItem('semp_video_stats')) || {};
      if (!stats[videoId]) stats[videoId] = { liked: false, disliked: false, bonusLikes: 0 };
      const current = stats[videoId];
      document.getElementById('likeCount').innerText = defaultLikes + current.bonusLikes;
      document.getElementById('likeBtn').classList.toggle('active', current.liked);
      document.getElementById('dislikeBtn').classList.toggle('active', current.disliked);
    }

    function toggleLike() {
      const stats = JSON.parse(localStorage.getItem('semp_video_stats')) || {};
      const current = stats[videoId] || { liked: false, disliked: false, bonusLikes: 0 };
      if (current.liked) { current.liked = false; current.bonusLikes = 0; }
      else { current.liked = true; current.disliked = false; current.bonusLikes = 1; }
      stats[videoId] = current;
      localStorage.setItem('semp_video_stats', JSON.stringify(stats));
      loadLikeDislike();
    }

    function toggleDislike() {
      const stats = JSON.parse(localStorage.getItem('semp_video_stats')) || {};
      const current = stats[videoId] || { liked: false, disliked: false, bonusLikes: 0 };
      if (current.disliked) { current.disliked = false; }
      else { current.disliked = true; current.liked = false; current.bonusLikes = 0; }
      stats[videoId] = current;
      localStorage.setItem('semp_video_stats', JSON.stringify(stats));
      loadLikeDislike();
    }

    // チャンネル登録
    function loadSubscribe() {
      const isSub = JSON.parse(localStorage.getItem('semp_subscribed')) || false;
      document.getElementById('subBtn').innerText = isSub ? "登録済み" : "チャンネル登録";
      document.getElementById('subBtn').classList.toggle('subscribed', isSub);
      document.getElementById('subCount').innerText = isSub ? "チャンネル登録者数 10.1万人" : "チャンネル登録者数 10万人";
    }

    function toggleSubscribe() {
      const isSub = JSON.parse(localStorage.getItem('semp_subscribed')) || false;
      localStorage.setItem('semp_subscribed', JSON.stringify(!isSub));
      loadSubscribe();
    }

    // コメント処理
    function loadComments() {
      const commentList = document.getElementById('commentList');
      commentList.innerHTML = "";
      const allComments = JSON.parse(localStorage.getItem('semp_comments')) || {};
      const currentComments = allComments[videoId] || [];
      document.getElementById('commentCount').innerText = `コメント ${currentComments.length} 件`;
      currentComments.forEach(text => {
        const item = document.createElement('div');
        item.innerText = `👤 ゲストユーザー: ${text}`;
        commentList.appendChild(item);
      });
    }

    function addComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;
      const allComments = JSON.parse(localStorage.getItem('semp_comments')) || {};
      if (!allComments[videoId]) allComments[videoId] = [];
      allComments[videoId].push(text);
      localStorage.setItem('semp_comments', JSON.stringify(allComments));
      input.value = "";
      loadComments();
    }

    document.getElementById('commentInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addComment(); });

    // 初期起動
    loadLikeDislike();
    loadSubscribe();
    loadComments();
  </script>
</body>
</html>
