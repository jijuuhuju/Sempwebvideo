<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>センプ・ザ・メイズ</title>
  <style>
    body { background:#0f0f0f; color:#fff; font-family:sans-serif; margin:0; padding:0; display:flex; flex-direction:column; min-height:100vh; }
    header { padding:12px 24px; border-bottom:1px solid #272727; }
    .logo { font-size:20px; font-weight:bold; color:#3ea6ff; text-decoration:none; }
    .game-container { max-width:600px; margin:30px auto; padding:0 16px; text-align:center; width:100%; box-sizing:border-box; }
    .screen-wrapper { width:100%; background:#111; border-radius:12px; aspect-ratio:16/9; display:flex; justify-content:center; align-items:center; border:2px solid #272727; }
    .maze-grid { display:grid; grid-template-columns:repeat(10, 26px); grid-template-rows:repeat(10, 26px); background:#222; border:4px solid #3ea6ff; }
    @media(min-width:480px) { .maze-grid { grid-template-columns:repeat(10, 35px); grid-template-rows:repeat(10, 35px); } }
    .cell { display:flex; justify-content:center; align-items:center; font-size:18px; user-select:none; }
    .wall { background:#444; border:1px solid #111; }
    .floor { background:#222; }
    .controls { display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:20px; }
    .row { display:flex; gap:12px; }
    .btn-move { background:#272727; color:white; border:none; width:65px; height:45px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:18px; }
    .btn-move:active { background:#3ea6ff; color:black; }
    .game-title { font-size:22px; font-weight:bold; margin:20px 0 10px 0; }
    .game-desc { color:#aaa; font-size:14px; margin-top:10px; }
    .status-text { font-size:18px; color:#00e5ff; font-weight:bold; margin-bottom:10px; }
  </style>
</head>
<body>
  <header><a href="index.html" class="logo">🏠 ホームへ戻る</a></header>
  <div class="game-container">
    <div class="game-title">🧩 センプ・ザ・メイズ</div>
    <!-- 現在のクリア回数を表示するメーター -->
    <div class="status-text" id="statusLabel">STAGE: 1 / 5</div>
    <div class="screen-wrapper"><div id="mazeContainer" class="maze-grid"></div></div>
    <div class="controls">
      <div class="row"><button class="btn-move" onclick="movePlayer(0,-1)">▲</button></div>
      <div class="row">
        <button class="btn-move" onclick="movePlayer(-1,0)">◀</button>
        <button class="btn-move" onclick="movePlayer(1,0)">▶</button>
      </div>
      <div class="row"><button class="btn-move" onclick="movePlayer(0,1)">▼</button></div>
    </div>
    <p class="game-desc">迷路を抜けて🎁を目指そう！</p>
  </div>
  <script>
    // 毎回形が変わるように、3パターンの迷路データを用意
    const stagePool = [
      [
        "WWWWWWWWWW",
        "WFFFFFFFFW",
        "WWWWWWFWFW",
        "WFFFFWFWFW",
        "WFWWWWWWFW",
        "WFWFFFFWFW",
        "WFWWBWWWFW",
        "WFWWFFFFFW",
        "WFFFFWWWGW",
        "WWWWWWWWWW"
      ],
      [
        "WWWWWWWWWW",
        "WFFFFWFFFF",
        "WFWWFWWWWW",
        "WFWWFFFFFW",
        "WFWWWWWWBW",
        "WFFFFFFFFW",
        "WWWWWWWWFW",
        "WFFFFFFFFW",
        "WGWWWWWWWW",
        "WWWWWWWWWW"
      ],
      [
        "WWWWWWWWWW",
        "WFFFFFFFFW",
        "WFWWWWWWWW",
        "WFWFFFFFFW",
        "WFWWWWWWBW",
        "WFFFFFFFFW",
        "WWWWWWWWFW",
        "WFFFFFFFFW",
        "WGWWWWWWWW",
        "WWWWWWWWWW"
      ]
    ];

    let currentStageMap = [];
    let pX = 1, pY = 1;
    let clearCount = 0; // クリアした回数を数える変数

    // 新しい迷路ステージをランダムにセットする関数
    function initNextStage() {
      // プールの中からランダムに1つの形を選ぶ
      const randomIndex = Math.floor(Math.random() * stagePool.length);
      currentStageMap = stagePool[randomIndex];
      
      // スタート位置を左上にリセット
      pX = 1; pY = 1;
      
      // 画面上のステージ表示を更新
      document.getElementById('statusLabel').innerText = `STAGE: ${clearCount + 1} / 5`;
      drawMaze();
    }

    function drawMaze() {
      const container = document.getElementById('mazeContainer');
      container.innerHTML = '';
      for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 10; x++) {
          const cell = document.createElement('div');
          const type = currentStageMap[y][x];
          
          cell.className = (type === "W" || type === "B") ? 'cell wall' : 'cell floor';
          
          if (type !== "W" && type !== "B") {
            if (x === pX && y === pY) cell.innerText = '😀';
            else if (type === "G") cell.innerText = '🎁';
          }
          container.appendChild(cell);
        }
      }
    }

    function movePlayer(dx, dy) {
      const nextX = pX + dx, nextY = pY + dy;
      if (currentStageMap[nextY][nextX] !== "W" && currentStageMap[nextY][nextX] !== "B") {
        pX = nextX; pY = nextY; drawMaze();
        
        // ゴール（G）に到達した時の処理
        if (currentStageMap[pY][pX] === "G") {
          clearCount++; // クリア回数を1増やす
          
          if (clearCount >= 5) {
            // 5回クリアを達成した時
            alert('🎉🎉 5ステージ全クリア！完全制覇おめでとう！ 🎉🎉');
            clearCount = 0; // カウントをリセット
            initNextStage();
          } else {
            // まだ5回未満の時は次のランダムステージへ
            alert(`ステージ ${clearCount} クリア！次の迷路に挑戦だ！🚀`);
            initNextStage();
          }
        }
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') { e.preventDefault(); movePlayer(0, -1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); movePlayer(0, 1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); movePlayer(-1, 0); }
      if (e.key === 'ArrowRight') { e.preventDefault(); movePlayer(1, 0); }
    });

    // 最初のステージを起動
    initNextStage();
  </script>
</body>
</html>
